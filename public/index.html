<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sange Cars EMS — Live Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --red:    #ff2d2d;
    --green:  #00ff88;
    --amber:  #ffaa00;
    --blue:   #00aaff;
    --dark:   #0a0c10;
    --panel:  #0f1318;
    --border: #1e2530;
    --text:   #c8d4e0;
    --dim:    #4a5568;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--red);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }
  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 3px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 2px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--green);
  }
  .pulse-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.8); }
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
    height: 48px;
    align-items: center;
    gap: 32px;
    flex-shrink: 0;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }
  .stat-value.red   { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .incident-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .incident-list::-webkit-scrollbar { width: 4px; }
  .incident-list::-webkit-scrollbar-track { background: transparent; }
  .incident-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .incident-card {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .incident-card:hover { border-color: var(--blue); background: #0d1117; }
  .incident-card.active { border-color: var(--red); background: rgba(255,45,45,0.04); }
  .incident-card.resolved { opacity: 0.5; border-color: var(--border); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .card-vehicle {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .card-plate {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 2px;
  }
  .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .badge.active   { background: rgba(255,45,45,0.15); color: var(--red); border: 1px solid rgba(255,45,45,0.3); }
  .badge.resolved { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }

  .card-stats {
    display: flex;
    gap: 12px;
  }
  .card-stat {
    font-size: 11px;
    color: var(--dim);
  }
  .card-stat span {
    color: var(--text);
    font-weight: 600;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 1px;
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  /* ── MAP ── */
  .map-container {
    flex: 1;
    position: relative;
  }
  #map { width: 100%; height: 100%; }

  .map-overlay {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }
  .map-badge {
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    color: var(--dim);
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .right-panel::-webkit-scrollbar { width: 4px; }
  .right-panel::-webkit-scrollbar-track { background: transparent; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .detail-label {
    font-size: 11px;
    color: var(--dim);
  }
  .detail-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text);
    text-align: right;
    max-width: 160px;
    word-break: break-all;
  }
  .detail-value.highlight { color: var(--red); font-weight: 700; font-size: 14px; }
  .detail-value.good { color: var(--green); }

  .btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-resolve { background: var(--green); color: #000; }
  .btn-maps    { background: var(--blue); color: #fff; }

  .no-selection {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 32px;
    text-align: center;
    gap: 12px;
  }
  .no-selection-icon { font-size: 40px; opacity: 0.2; }

  /* ── ALERT POPUP ── */
  .alert-popup {
    position: fixed;
    top: 70px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--red);
    border-left: 4px solid var(--red);
    border-radius: 8px;
    padding: 16px 20px;
    max-width: 300px;
    z-index: 9999;
    animation: slideIn 0.4s ease;
    box-shadow: 0 8px 32px rgba(255,45,45,0.2);
  }
  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0);   opacity: 1; }
  }
  .alert-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--red);
    margin-bottom: 6px;
  }
  .alert-body {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
  }
  .alert-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 16px;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #0d1117; }
  .leaflet-tile { filter: brightness(0.7) saturate(0.6); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🚨</div>
    <div>
      <div class="logo-text">SANGE CARS EMS</div>
      <div class="logo-sub">EMERGENCY MONITORING SYSTEM</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:-- UTC</div>
    <div class="status-pill">
      <div class="pulse-dot"></div>
      LIVE
    </div>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">Total Incidents</div>
    <div class="stat-value" id="stat-total">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Active</div>
    <div class="stat-value red" id="stat-active">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Resolved</div>
    <div class="stat-value green" id="stat-resolved">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Avg G-Force</div>
    <div class="stat-value amber" id="stat-gforce">0.0G</div>
  </div>
  <div class="stat">
    <div class="stat-label">Last Incident</div>
    <div class="stat-value" id="stat-last">—</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>INCIDENTS</span>
      <span id="incident-count">0</span>
    </div>
    <div class="incident-list" id="incident-list">
      <div class="empty-state">
        <div class="empty-icon">🛡️</div>
        <div>No accidents detected</div>
        <div style="color:#2a3544;font-size:10px;letter-spacing:2px">ALL CLEAR</div>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-overlay">
      <div class="map-badge">📡 OPENSTREETMAP</div>
      <div class="map-badge" id="map-status">MONITORING AREA</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="right-panel">
    <div class="no-selection">
      <div class="no-selection-icon">📋</div>
      <div>Select an incident<br>to view details</div>
    </div>
  </div>

</div>

<script>
// ── FIREBASE CONFIG ────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyA2z2obR26KZYH61CseBwvFK3tUsJe3jE4",
  authDomain:        "accident-detection-syste-9eb45.firebaseapp.com",
  projectId:         "accident-detection-syste-9eb45",
  storageBucket:     "accident-detection-syste-9eb45.firebasestorage.app",
  messagingSenderId: "855246253211",
  appId:             "1:855246253211:web:a1cbdabb98e0ea8c772a3e",
  databaseURL:       "https://accident-detection-syste-9eb45-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ── MAP SETUP ──────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([5.6037, -0.1870], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

// Custom marker icons
const redIcon = L.divIcon({
  className: '',
  html: '<div style="width:32px;height:32px;background:#ff2d2d;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 4px 12px rgba(255,45,45,0.5)"></div>',
  iconSize: [32, 32], iconAnchor: [16, 32]
});
const greenIcon = L.divIcon({
  className: '',
  html: '<div style="width:24px;height:24px;background:#00ff88;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,255,136,0.4)"></div>',
  iconSize: [24, 24], iconAnchor: [12, 12]
});

// ── STATE ──────────────────────────────────────────────────────
let accidents      = {};
let markers        = {};
let routeLayers    = {};
let selectedKey    = null;
let activeRouteLayer = null;

// ── CLOCK ──────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s} UTC`;
}
setInterval(updateClock, 1000);
updateClock();

// ── ALERT POPUP ────────────────────────────────────────────────
function showAlert(accident) {
  const existing = document.querySelector('.alert-popup');
  if (existing) existing.remove();

  const popup = document.createElement('div');
  popup.className = 'alert-popup';
  popup.innerHTML = `
    <button class="alert-close" onclick="this.parentElement.remove()">✕</button>
    <div class="alert-title">⚠ ACCIDENT DETECTED</div>
    <div class="alert-body">
      <strong>${accident.vehicle}</strong> (${accident.plate})<br>
      G-Force: <strong style="color:#ff2d2d">${accident.gforce}G</strong><br>
      ${accident.date} at ${accident.time}<br>
      Hospital: ${accident.hospital?.name || 'Locating...'}
    </div>
  `;
  document.body.appendChild(popup);
  setTimeout(() => { if (popup.parentElement) popup.remove(); }, 8000);
}

// ── STATS UPDATE ───────────────────────────────────────────────
function updateStats() {
  const list  = Object.values(accidents);
  const total = list.length;
  const active = list.filter(a => a.status === 'ACTIVE').length;
  const resolved = list.filter(a => a.status === 'RESOLVED').length;
  const avgG = total > 0
    ? (list.reduce((s,a) => s + (a.gforce||0), 0) / total).toFixed(1)
    : '0.0';
  const last = total > 0
    ? list[list.length-1].time || '—'
    : '—';

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-resolved').textContent = resolved;
  document.getElementById('stat-gforce').textContent  = avgG + 'G';
  document.getElementById('stat-last').textContent    = last;
  document.getElementById('incident-count').textContent = total;
}

// ── SIDEBAR RENDER ─────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('incident-list');
  const keys = Object.keys(accidents);

  if (keys.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛡️</div>
        <div>No accidents detected</div>
        <div style="color:#2a3544;font-size:10px;letter-spacing:2px">ALL CLEAR</div>
      </div>`;
    return;
  }

  // Newest first
  const sorted = keys.slice().reverse();
  list.innerHTML = sorted.map(key => {
    const a = accidents[key];
    const isActive   = a.status === 'ACTIVE';
    const isSelected = key === selectedKey;
    return `
      <div class="incident-card ${isActive ? 'active' : 'resolved'} ${isSelected ? 'selected' : ''}"
           onclick="selectIncident('${key}')" id="card-${key}">
        <div class="card-top">
          <div>
            <div class="card-vehicle">${a.vehicle}</div>
            <div class="card-plate">${a.plate}</div>
          </div>
          <div class="badge ${isActive ? 'active' : 'resolved'}">${isActive ? 'ACTIVE' : 'RESOLVED'}</div>
        </div>
        <div class="card-stats">
          <div class="card-stat">G: <span>${a.gforce}G</span></div>
          <div class="card-stat">Time: <span>${a.time || '—'}</span></div>
          <div class="card-stat">ETA: <span>${a.route?.duration_min || '?'}min</span></div>
        </div>
      </div>`;
  }).join('');
}

// ── DETAIL PANEL ───────────────────────────────────────────────
function renderDetail(key) {
  const a = accidents[key];
  if (!a) return;
  const panel = document.getElementById('right-panel');
  const isActive = a.status === 'ACTIVE';

  panel.innerHTML = `
    <div class="panel-section">
      <div class="panel-title">Vehicle Info</div>
      <div class="detail-row">
        <div class="detail-label">Vehicle</div>
        <div class="detail-value">${a.vehicle}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Plate</div>
        <div class="detail-value">${a.plate}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value ${isActive ? '' : 'good'}">${a.status}</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">Impact Data</div>
      <div class="detail-row">
        <div class="detail-label">G-Force</div>
        <div class="detail-value highlight">${a.gforce}G</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value">${a.date || '—'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Time</div>
        <div class="detail-value">${a.time || '—'}</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">Location</div>
      <div class="detail-row">
        <div class="detail-label">Latitude</div>
        <div class="detail-value">${a.lat?.toFixed(6) || '—'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Longitude</div>
        <div class="detail-value">${a.lng?.toFixed(6) || '—'}</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">Emergency Response</div>
      <div class="detail-row">
        <div class="detail-label">Hospital</div>
        <div class="detail-value">${a.hospital?.name || '—'}</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Distance</div>
        <div class="detail-value">${a.route?.distance_km || '—'} km</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">ETA</div>
        <div class="detail-value good">${a.route?.duration_min || '—'} min</div>
      </div>
    </div>

    <div class="panel-section">
      ${isActive ? `<button class="btn btn-resolve" onclick="resolveAccident('${key}')">✓ MARK RESOLVED</button>` : ''}
      <button class="btn btn-maps" onclick="window.open('${a.maps_link}','_blank')">📍 OPEN IN MAPS</button>
    </div>
  `;
}

// ── SELECT INCIDENT ────────────────────────────────────────────
function selectIncident(key) {
  selectedKey = key;
  renderSidebar();
  renderDetail(key);

  const a = accidents[key];
  if (!a || !a.lat || !a.lng) return;

  // Pan map to accident
  map.setView([a.lat, a.lng], 14);

  // Show route
  if (activeRouteLayer) { map.removeLayer(activeRouteLayer); activeRouteLayer = null; }
  if (a.route?.coordinates?.length > 0) {
    const latlngs = a.route.coordinates.map(c => [c[1], c[0]]);
    activeRouteLayer = L.polyline(latlngs, {
      color: '#00aaff',
      weight: 4,
      opacity: 0.8,
      dashArray: '8, 4'
    }).addTo(map);
  }
}

// ── RESOLVE ────────────────────────────────────────────────────
function resolveAccident(key) {
  fetch(`/api/accident/${key}/resolve`, { method: 'POST' })
    .then(r => r.json())
    .then(() => { accidents[key].status = 'RESOLVED'; renderSidebar(); renderDetail(key); updateStats(); })
    .catch(e => console.error('Resolve error:', e));
}

// ── ADD/UPDATE MARKER ──────────────────────────────────────────
function upsertMarker(key, accident) {
  if (!accident.lat || !accident.lng) return;

  if (markers[key]) { map.removeLayer(markers[key]); }

  const icon = accident.status === 'ACTIVE' ? redIcon : greenIcon;
  const marker = L.marker([accident.lat, accident.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <strong>${accident.vehicle}</strong> (${accident.plate})<br>
      G-Force: ${accident.gforce}G<br>
      ${accident.date} ${accident.time}<br>
      <em>${accident.hospital?.name || ''}</em>
    `);
  marker.on('click', () => selectIncident(key));
  markers[key] = marker;

  // Hospital marker
  if (accident.hospital?.lat && accident.hospital?.lat !== accident.lat) {
    L.marker([accident.hospital.lat, accident.hospital.lng], { icon: greenIcon })
      .addTo(map)
      .bindPopup(`🏥 ${accident.hospital.name}`);
  }
}

// ── FIREBASE LISTENER ──────────────────────────────────────────
let isFirstLoad = true;
const accidentsRef = database.ref('/accidents');

accidentsRef.on('value', snapshot => {
  const data = snapshot.val() || {};
  const prevKeys = Object.keys(accidents);
  accidents = data;

  // Detect new accidents
  if (!isFirstLoad) {
    Object.keys(data).forEach(key => {
      if (!prevKeys.includes(key)) { showAlert(data[key]); }
    });
  }
  isFirstLoad = false;

  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  Object.keys(markers).forEach(k => delete markers[k]);

  // Add markers
  Object.entries(data).forEach(([key, accident]) => upsertMarker(key, accident));

  renderSidebar();
  updateStats();

  if (selectedKey && accidents[selectedKey]) renderDetail(selectedKey);
});

</script>
</body>
</html>
